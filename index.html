<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>RHDSynapse AI</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
    }

    header {
      background: #1e293b;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    #chatBox {
      height: 80vh;
      overflow-y: auto;
      padding: 10px;
    }

    .msg {
      margin: 10px 0;
      padding: 10px;
      border-radius: 10px;
      max-width: 70%;
    }

    .user {
      background: #2563eb;
      margin-left: auto;
    }

    .ai {
      background: #334155;
    }

    #inputArea {
      display: flex;
      padding: 10px;
      background: #1e293b;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
    }

    button {
      margin-left: 10px;
      padding: 10px;
      border: none;
      background: #22c55e;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<header>RHDSynapse AI</header>

<div id="chatBox"></div>

<div id="inputArea">
  <input type="text" id="userInput" placeholder="Tulis pesan...">
  <button onclick="sendMessage()">Kirim</button>
</div>

<script>
function addMessage(text, className) {
  const msg = document.createElement("div");
  msg.className = "msg " + className;
  msg.innerText = text;
  document.getElementById("chatBox").appendChild(msg);
}

async function sendMessage() {
  const input = document.getElementById("userInput");
  const text = input.value;

  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  // Dummy AI response
  setTimeout(() => {
    addMessage("Ini respon AI dari RHDSynapse 🤖", "ai");
  }, 1000);
}
</script>

</body>
</html>
